name: Acceptance Tests
on:
  push:
    branches: [master, develop]
  pull_request:
    types:
      - opened
      - synchronize
  schedule:
    - cron: 0 12 * * 5
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      WALLARM_API_HOST: ${{ secrets.WALLARM_API_HOST }}
      WALLARM_API_TOKEN: ${{ secrets.WALLARM_API_TOKEN }}
      WALLARM_PARTNER_UUID: ${{ secrets.WALLARM_PARTNER_UUID }}
      WALLARM_EXTRA_PERMISSIONS: 1
      WALLARM_GLOBAL_ADMIN: 1
    steps:
    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: ^1.24
      id: go
    - name: Check out code into the Go module directory
      uses: actions/checkout@v2

    - name: Create test tenant
      id: tenant
      run: |
        TENANT_ID=$(go run ./scripts/ci-tenant-create/)
        echo "tenant_id=$TENANT_ID" >> "$GITHUB_OUTPUT"
        echo "Created test tenant: $TENANT_ID"

    - name: Run acceptance tests
      env:
        WALLARM_API_CLIENT_ID: ${{ steps.tenant.outputs.tenant_id }}
      run: make testacc

    - name: Delete test tenant
      if: ${{ always() && steps.tenant.outputs.tenant_id != '' }}
      run: go run ./scripts/ci-tenant-delete/ ${{ steps.tenant.outputs.tenant_id }}
